<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jervice Mobile</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#121212; color:#f5f5f5; }
    .app { max-width:600px; margin:0 auto; padding:16px; }
    .header { text-align:center; margin-bottom:16px; }
    .header h1 { margin:0; font-size:2rem; }
    .header p { margin:8px 0 0; color:#bbb; }
    .chat { display:flex; flex-direction:column; gap:12px; max-height:65vh; overflow-y:auto; padding:8px 0; }
    .bubble { border-radius:18px; padding:12px 16px; line-height:1.5; max-width:90%; }
    .user { align-self:flex-end; background:#1f2937; }
    .assistant { align-self:flex-start; background:#2a4365; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .controls textarea { flex:1 1 100%; min-height:90px; border:1px solid #333; border-radius:12px; background:#0f172a; color:#f5f5f5; padding:12px; resize:vertical; }
    .controls button { border:none; border-radius:12px; padding:14px 18px; cursor:pointer; font-size:1rem; color:#fff; background:#2563eb; flex:1 1 48%; }
    .controls button.secondary { background:#334155; }
    .info { font-size:0.9rem; color:#9ca3af; margin-top:12px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Jervice</h1>
      <p>Mobile-friendly AI chat with voice commands.</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="controls">
      <textarea id="prompt" placeholder="Ask Jervice anything..."></textarea>
      <button id="send">Send</button>
      <button id="voice" class="secondary">🎤 Voice</button>
      <button id="clear" class="secondary">Clear</button>
    </div>

    <div class="info">
      This mobile Jervice uses the same API key flow as your assistant. Set `JERVICE_API_KEY` in the server environment.
      Open this page from your phone on the same Wi-Fi network.<br>
      Example: `http://YOUR-PC-IP:5000`
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const prompt = document.getElementById('prompt');
    const send = document.getElementById('send');
    const voice = document.getElementById('voice');
    const clear = document.getElementById('clear');

    function addBubble(text, type) {
      const bubble = document.createElement('div');
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function speakText(text) {
      if (!window.speechSynthesis) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
    }

    async function sendPrompt(text) {
      if (!text) return;
      addBubble(text, 'user');
      prompt.value = '';
      addBubble('Thinking...', 'assistant');
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });
        const data = await response.json();
        const answer = data.text || data.error || 'No response';
        chat.lastElementChild.textContent = answer;
        if (!data.error) speakText(answer);
      } catch (err) {
        chat.lastElementChild.textContent = 'Network error. Make sure the server is running.';
      }
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert('Voice recognition not supported in this browser.');
        return;
      }

      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new Recognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        voice.textContent = 'Listening...';
      };
      recognition.onerror = () => {
        voice.textContent = '🎤 Voice';
      };
      recognition.onend = () => {
        voice.textContent = '🎤 Voice';
      };
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        prompt.value = transcript;
        sendPrompt(transcript);
      };

      recognition.start();
    }

    send.addEventListener('click', () => sendPrompt(prompt.value.trim()));
    voice.addEventListener('click', startVoice);
    prompt.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendPrompt(prompt.value.trim());
      }
    });
    clear.addEventListener('click', () => { chat.innerHTML = ''; prompt.value = ''; });
  </script>
</body>
</html>
